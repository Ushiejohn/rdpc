name: Test Environment\n\non: [workflow_dispatch]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Start 6-hour timer\n        run: |\n          echo "Environment will run for 6 hours."\n          for ((i=1; i<=12; i++)); do\n            echo "Logging status update: Hour $i";\n            sleep 1800;  # Wait for 30 minutes\n          done\n          echo "6-hour test environment has ended."\n\n      - name: Final status\n        run: echo "Environment stopped after 6 hours."\n